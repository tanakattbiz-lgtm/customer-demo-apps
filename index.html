<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Demo Portal | customer-demo-apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(16% 0.02 265);
    --surface: oklch(21% 0.025 265);
    --surface-2: oklch(25% 0.03 265);
    --border: oklch(32% 0.03 265);
    --text: oklch(93% 0.01 265);
    --text-dim: oklch(70% 0.02 265);
    --primary: oklch(70% 0.17 265);
    --primary-strong: oklch(60% 0.2 265);
    --danger: oklch(65% 0.19 25);
    --radius: 14px;
    --font: "Inter", "Noto Sans JP", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    font-family: var(--font);
    background:
      radial-gradient(60rem 40rem at 85% -10%, oklch(35% 0.09 290 / 0.5), transparent 60%),
      radial-gradient(50rem 35rem at -10% 100%, oklch(32% 0.08 230 / 0.4), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100dvh;
    line-height: 1.7;
  }
  a { color: inherit; }

  /* ---------- ロック画面 ---------- */
  #gate {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .gate-card {
    width: min(420px, 100%);
    background: oklch(23% 0.03 265 / 0.7);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 24px 60px oklch(0% 0 0 / 0.4);
    animation: rise 0.5s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } }
  .gate-card .lock {
    width: 52px; height: 52px;
    display: grid; place-items: center;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary-strong), oklch(55% 0.18 300));
    margin-bottom: 20px;
  }
  .gate-card h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.01em; }
  .gate-card p { color: var(--text-dim); font-size: 0.88rem; margin: 6px 0 24px; }
  .gate-card input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: oklch(17% 0.02 265);
    color: var(--text);
    font-size: 1rem;
    font-family: var(--font);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gate-card input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px oklch(70% 0.17 265 / 0.25);
  }
  .gate-card button {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary-strong), oklch(55% 0.18 300));
    color: white;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: transform 0.15s ease-out, filter 0.15s;
  }
  .gate-card button:hover { filter: brightness(1.12); }
  .gate-card button:active { transform: scale(0.98); }
  #gate-error {
    color: var(--danger);
    font-size: 0.82rem;
    margin-top: 12px;
    min-height: 1.2em;
  }
  .shake { animation: shake 0.35s; }
  @keyframes shake {
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  /* ---------- 一覧画面 ---------- */
  #portal { display: none; max-width: 1080px; margin: 0 auto; padding: 48px 24px 96px; }
  header.site {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 40px; flex-wrap: wrap;
  }
  header.site h1 { font-size: clamp(1.4rem, 3vw, 1.9rem); font-weight: 700; }
  header.site .sub { color: var(--text-dim); font-size: 0.88rem; }
  #logout {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 0.82rem;
    font-family: var(--font);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #logout:hover { color: var(--text); border-color: var(--text-dim); }

  #search {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: oklch(19% 0.02 265);
    color: var(--text);
    font-size: 0.95rem;
    font-family: var(--font);
  }
  #search:focus { outline: none; border-color: var(--primary); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: transform 0.2s ease-out, border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: oklch(70% 0.17 265 / 0.6);
    box-shadow: 0 12px 32px oklch(0% 0 0 / 0.35);
  }
  .card .customer {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--primary);
  }
  .card h2 { font-size: 1.08rem; font-weight: 700; margin: 6px 0 10px; }
  .card .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card .date { color: var(--text-dim); font-size: 0.78rem; }
  .tag {
    font-size: 0.72rem;
    color: var(--text-dim);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 2px 10px;
    border-radius: 999px;
  }
  .badge-archived {
    font-size: 0.72rem;
    color: var(--danger);
    border: 1px solid oklch(65% 0.19 25 / 0.4);
    padding: 2px 10px;
    border-radius: 999px;
  }
  #empty {
    color: var(--text-dim);
    text-align: center;
    padding: 80px 0;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    font-size: 0.92rem;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<!-- ================= ロック画面 ================= -->
<div id="gate">
  <form class="gate-card" id="gate-form">
    <div class="lock" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Demo Portal</h1>
    <p>このページは関係者専用です。パスワードを入力してください。</p>
    <input type="password" id="password" placeholder="パスワード" autocomplete="current-password" autofocus />
    <button type="submit">ロックを解除</button>
    <div id="gate-error" role="alert"></div>
  </form>
</div>

<!-- ================= デモ一覧 ================= -->
<div id="portal">
  <header class="site">
    <div>
      <h1>📦 Demo Portal</h1>
      <div class="sub">customer-demo-apps — 顧客向けモック一覧</div>
    </div>
    <button id="logout">ロックする</button>
  </header>
  <input type="search" id="search" placeholder="顧客名・タイトル・タグで検索…" />
  <div class="grid" id="demo-grid"></div>
  <div id="empty" hidden>まだデモが登録されていません。新しいデモを作成したら、このファイルの <code>DEMOS</code> 配列に追加してください。</div>
</div>

<script>
/* =========================================================
 * デモ登録リスト
 * 新しいデモを作成したら、ここに 1 エントリ追加する。
 * =========================================================
 * {
 *   customer: "acme-corp",       // ディレクトリ名
 *   name:     "ACME 株式会社",    // 顧客表示名
 *   title:    "予約管理システム",  // デモタイトル
 *   path:     "./acme-corp/",     // 相対パス(末尾スラッシュ)
 *   date:     "2026-07-08",       // 作成日
 *   tags:     ["予約", "管理画面"],
 *   status:   "active",           // active | archived
 * }
 * ======================================================= */
const DEMOS = [
  {
    customer: "law-office",
    name:     "○○法律事務所",
    title:    "業務管理システム + 集客LP(弁護士事務所)",
    path:     "./law-office/",
    date:     "2026-07-08",
    tags:     ["士業", "LP", "案件管理", "チャット", "Square決済", "会員管理", "履歴出力", "React"],
    status:   "active",
  },
];

/* ---------- パスワードゲート(SHA-256 照合) ---------- */
const PASSWORD_HASH = "7ca93ba71db550419286778f18a0ee57fd685632c7f9cd0caa31586a8ec0ef8e";
const SESSION_KEY = "demo-portal-auth";

async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function unlock() {
  document.getElementById("gate").style.display = "none";
  document.getElementById("portal").style.display = "block";
  renderDemos();
}

document.getElementById("gate-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("password");
  const err = document.getElementById("gate-error");
  const hash = await sha256(input.value);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem(SESSION_KEY, PASSWORD_HASH);
    unlock();
  } else {
    err.textContent = "パスワードが違います。";
    input.value = "";
    const card = e.target;
    card.classList.remove("shake");
    requestAnimationFrame(() => card.classList.add("shake"));
  }
});

document.getElementById("logout").addEventListener("click", () => {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
});

if (sessionStorage.getItem(SESSION_KEY) === PASSWORD_HASH) unlock();

/* ---------- 一覧レンダリング ---------- */
function renderDemos(query = "") {
  const grid = document.getElementById("demo-grid");
  const empty = document.getElementById("empty");
  const q = query.trim().toLowerCase();
  const list = DEMOS
    .filter(d => !q || [d.customer, d.name, d.title, ...(d.tags || [])].join(" ").toLowerCase().includes(q))
    .sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  grid.innerHTML = "";
  empty.hidden = list.length > 0;

  for (const d of list) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = d.path;
    a.innerHTML = `
      <div class="customer"></div>
      <h2></h2>
      <div class="meta">
        <span class="date"></span>
      </div>`;
    a.querySelector(".customer").textContent = d.name || d.customer;
    a.querySelector("h2").textContent = d.title;
    a.querySelector(".date").textContent = d.date || "";
    const meta = a.querySelector(".meta");
    for (const t of d.tags || []) {
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = t;
      meta.appendChild(tag);
    }
    if (d.status === "archived") {
      const b = document.createElement("span");
      b.className = "badge-archived";
      b.textContent = "アーカイブ";
      meta.appendChild(b);
    }
    grid.appendChild(a);
  }
}

document.getElementById("search").addEventListener("input", (e) => renderDemos(e.target.value));
</script>
</body>
</html>
